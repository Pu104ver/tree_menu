{% extends 'base.html' %}
{% load menu_tags %}

{% block content %}
    <h1 class="mt-3">Главная страница</h1>
    {% if parent_data %}
      {% for parent_item, menu_data in parent_data.items %}
          {{ menu_data.menu_html | safe }}
      {% endfor %}
    {% else %}
        <h1>Кажется, родителей не обнаружено...</h1>
    {% endif %}
{% endblock %}
